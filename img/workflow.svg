<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc" rx="15" />
  
  <style>
    .node { font-family: sans-serif; font-weight: bold; }
    .label { font-family: sans-serif; font-size: 14px; fill: #64748b; }
  </style>

  <!-- Connectors -->
  <path d="M 150 200 L 350 200" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="8" />
  <path d="M 450 200 L 650 200" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="8" />

  <!-- Node 1: User -->
  <g transform="translate(100, 200)">
    <circle r="50" fill="#3b82f6" opacity="0.2">
      <animate attributeName="r" values="45;55;45" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle r="45" fill="#2563eb" />
    <text y="5" text-anchor="middle" fill="white" class="node">USER</text>
    <text y="75" text-anchor="middle" class="label">Submits Report</text>
  </g>

  <!-- Node 2: Backend -->
  <g transform="translate(400, 200)">
    <rect x="-60" y="-50" width="120" height="100" rx="10" fill="#10b981" />
    <text y="5" text-anchor="middle" fill="white" class="node">BACKEND</text>
    <text y="75" text-anchor="middle" class="label">PHP &amp; MySQL</text>
  </g>

  <!-- Node 3: Result -->
  <g transform="translate(700, 200)">
    <circle r="50" fill="#f59e0b" />
    <text y="5" text-anchor="middle" fill="white" class="node">ACTION</text>
    <text y="75" text-anchor="middle" class="label">Clean-up</text>
  </g>

  <!-- Data Packets -->
  <circle r="6" fill="#3b82f6">
    <animateMotion dur="3s" repeatCount="indefinite" path="M 150 200 L 350 200" />
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" />
  </circle>

  <circle r="6" fill="#10b981">
    <animateMotion dur="3s" begin="1.5s" repeatCount="indefinite" path="M 450 200 L 650 200" />
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" begin="1.5s" repeatCount="indefinite" />
  </circle>

  <text x="400" y="40" text-anchor="middle" font-size="22" font-family="sans-serif" font-weight="bold" fill="#1e293b">IBPFM Workflow Automation</text>
</svg>
